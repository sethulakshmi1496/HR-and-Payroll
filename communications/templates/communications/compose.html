{% extends 'onboarding/base.html' %}
{% block title %}Compose Mail - AEC Group{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto py-8">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">Compose Mail</h1>
            <p class="text-slate-500 mt-1">Send a new internal communication.</p>
        </div>
        <a href="{% url 'communications:inbox' %}" class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-800 flex items-center">
            &larr; Back to Inbox
        </a>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">To (Email Address) <span class="text-red-500">*</span></label>
                <input type="email" name="recipient_email" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400" placeholder="recipient@example.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Subject <span class="text-red-500">*</span></label>
                <input type="text" name="subject" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400" placeholder="Mail subject">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Message <span class="text-red-500">*</span></label>
                <textarea name="body" rows="10" required class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400" placeholder="Write your message here..."></textarea>
            </div>
            <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
                <a href="{% url 'communications:inbox' %}" class="px-5 py-2.5 text-sm font-medium text-slate-600 border border-slate-300 rounded-lg hover:bg-slate-50 transition">Cancel</a>
                <button type="submit" class="px-6 py-2.5 bg-violet-600 hover:bg-violet-700 text-white text-sm font-semibold rounded-lg shadow-sm transition">
                    Send Mail
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
