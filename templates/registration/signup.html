{% extends 'onboarding/base.html' %}

{% block title %}Sign Up - AEC HR SuperApp{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="max-w-md w-full bg-white rounded-xl shadow-sm border border-slate-200 p-8">
        <div class="mb-8 text-center">
            <h2 class="text-2xl font-bold text-slate-900">Create an Account</h2>
            <p class="text-slate-500 text-sm mt-1">Sign up for AEC HR SuperApp</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-5" data-allow-md>
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" required autofocus
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" name="username" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Role</label>
                <select name="role" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                    <option value="">Select a role...</option>
                    {% for value, label in roles %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Re-enter Password</label>
                <input type="password" name="re_password" required
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            
            <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-200 transition-all" data-allow-md>
                Sign Up
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-600">
            Already have an account? <a href="{% url 'login' %}" class="font-medium text-blue-600 hover:underline">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
