{% load i18n static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Time Setup - AEC HR</title>
    <script>
        (function() { try {
            var t = localStorage.getItem('aec_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        } catch(e) {} })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/zoho.css' %}">
</head>
<body class="antialiased">
    <div class="zh-public">
        <div class="zh-public-card" style="max-width:480px;">
            <div class="zh-public-brand">
                <div class="zh-brand-mark" style="width:48px;height:48px;font-size:17px;border-radius:14px;">AE</div>
                <div style="text-align:center;">
                    <div style="font-size:18px;font-weight:700;color:var(--text-strong);letter-spacing:-.01em;">AEC Group</div>
                    <div style="font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;font-weight:600;">First Time Setup</div>
                </div>
            </div>

            <h2 class="text-base font-semibold mb-1" style="color:var(--text-strong);">Create the Managing Director account</h2>
            <p class="text-sm mb-6" style="color:var(--text-muted);">This bootstraps the database with an owner account.</p>

            <form method="post" action="{% url 'setup' %}" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Username</label>
                    <input type="text" name="username" required class="w-full px-3.5 py-2.5 rounded-lg text-sm" style="background:var(--surface-alt);border:1px solid var(--border);" placeholder="md_admin">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">First Name</label>
                    <input type="text" name="first_name" required class="w-full px-3.5 py-2.5 rounded-lg text-sm" style="background:var(--surface-alt);border:1px solid var(--border);" placeholder="John">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Email</label>
                    <input type="email" name="email" required class="w-full px-3.5 py-2.5 rounded-lg text-sm" style="background:var(--surface-alt);border:1px solid var(--border);" placeholder="md@aec.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold mb-1.5" style="color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;">Password</label>
                    <input type="password" name="password" required class="w-full px-3.5 py-2.5 rounded-lg text-sm" style="background:var(--surface-alt);border:1px solid var(--border);" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-2.5 text-white font-medium rounded-lg text-sm transition" style="background:var(--brand-500);box-shadow:0 4px 12px rgba(30,116,227,.25);">
                    Create MD Account
                </button>
            </form>
        </div>
    </div>

    <script>
        function zhToggleTheme() {
            var cur = document.documentElement.getAttribute('data-theme') || 'light';
            var next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            try { localStorage.setItem('aec_theme', next); } catch(e) {}
        }
    </script>
</body>
</html>
